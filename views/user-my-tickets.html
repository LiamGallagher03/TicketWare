<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tickets - User</title>
    <link rel="stylesheet" href="adminStyle.css">
</head>
<body>

    <header class="top-bar">
        <a href="/user-landing-page.html" style="margin-left: 20px; text-decoration: none; color: #666;">← Back</a>
    </header>

    <main class="table-container">
        <h1>My Submitted Tickets</h1>
        
        <table class="ticket-table">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Hardware</th>
                    <th>Serial Number</th>
                    <th>Status</th>
                    <th>Date Created</th>
                </tr>
            </thead>
            <tbody id="user-tickets-body">
                <tr>
                    <td colspan="6">Loading your tickets...</td>
                </tr>
            </tbody>
        </table>
    </main>

    <script src="/user-my-tickets.js"></script>

</body>
</html>
