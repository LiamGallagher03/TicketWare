<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Hardware Ticket</title>

    <link rel="stylesheet" href="create-ticket.css">
</head>
<body>
    <header class="top-bar">
        <a href="/user-landing-page.html" style="margin-left: 20px; text-decoration: none; color: #666;">← Back</a>
    </header>

    <div class="container">
        <h1>Create Hardware Ticket</h1>
        <form id="create-ticket-form">
            <div class="form-group">
                <label for="title">Title *</label>
                <input type="text" id="title" name="title" required>
            </div>

            <div class="form-group">
                <label for="description">Description *</label>
                <textarea id="description" name="description" required></textarea>
            </div>

            <div class="form-group">
                <label for="hardware-name">Hardware Name</label>
                <input type="text" id="hardware-name" name="hardware-name">
            </div>

            <div class="form-group">
                <label for="serial-number">Serial Number</label>
                <input type="text" id="serial-number" name="serial-number">
            </div>


            <button type="submit">Create Ticket</button>
        </form>
    </div>

    <script src="/create-ticket.js"></script>
</body>
</html>
