<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tickets - Admin</title>
    <link rel="stylesheet" href="adminStyle.css">
</head>
<body>

    <header class="top-bar">
        <div class="user-greeting">Admin View: <span>My System Tickets</span></div>
        <a href="admin.html" style="margin-left: 20px; text-decoration: none; color: #666;">← Back</a>
    </header>

    <main class="table-container">
        <h1>Ticket Inventory</h1>
        
        <table class="ticket-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>User</th>
                    <th>Issue</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>#1001</td>
                    <td>jsmith88</td>
                    <td>Laptop won't boot</td>
                    <td><span class="prio-high">High</span></td>
                    <td>Open</td>
                    <td><button class="btn-sm">Edit</button></td>
                </tr>
                <tr>
                    <td>#1002</td>
                    <td>mgarcia</td>
                    <td>Password Reset</td>
                    <td><span class="prio-low">Low</span></td>
                    <td>Resolved</td>
                    <td><button class="btn-sm">Edit</button></td>
                </tr>
            </tbody>
        </table>
    </main>

</body>
</html>
