<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Hardware Ticket</title>

    <link rel="stylesheet" href="create-ticket.css">
</head>
<body>
    <div class="container">
        <h1>Create Hardware Ticket</h1>
        <form>
            <div class="form-group">
                <label for="title">Title *</label>
                <input type="text" id="title" name="title" required>
            </div>

            <div class="form-group">
                <label for="description">Description *</label>
                <textarea id="description" name="description" required></textarea>
            </div>

            <div class="form-group">
                <label for="hardware-name">Hardware Name *</label>
                <input type="text" id="hardware-name" name="hardware-name" required>
            </div>

            <div class="form-group">
                <label for="hardware-brand">Hardware Brand *</label>
                <input type="text" id="hardware-brand" name="hardware-brand" required>
            </div>

            <button type="submit">Create Ticket</button>
        </form>
    </div>
</body>
</html>
